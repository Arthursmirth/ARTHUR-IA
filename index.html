<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MICHAEL TOOLS</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 50px; }
        .card { border: 1px solid #0f0; display: inline-block; padding: 30px; box-shadow: 0 0 10px #0f0; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px; width: 200px; }
        button { background: #0f0; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="card">
        <h1>MICHAEL TOOLS 🛠️</h1>
        <input type="text" id="phone" placeholder="Ex: 221770000000">
        <button onclick="track()">TRACKER</button>
        <div id="result">Prêt...</div>
    </div>

    <script>
        async function track() {
            const num = document.getElementById('phone').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Recherche...";
            try {
                const response = await fetch(`/check/${num}`);
                const data = await response.json();
                resDiv.innerHTML = data.online ? "🟢 EN LIGNE" : "🔴 HORS LIGNE";
            } catch (e) {
                resDiv.innerText = "Erreur de connexion";
            }
        }
    </script>
</body>
</html>
