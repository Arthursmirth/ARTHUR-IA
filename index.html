    <style>
        :root {
            --neon-red: #ff0000;
            --dark-bg: #050505;
            --glass: rgba(255, 0, 0, 0.1);
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: white;
            font-family: 'Fira Code', monospace;
            overflow-x: hidden;
        }

        /* --- BACKGROUND ANIMÉ --- */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* --- SIDEBAR PRO --- */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 1000;
            top: 0; left: 0; background: rgba(10, 0, 0, 0.95);
            overflow-x: hidden; transition: 0.5s; padding-top: 60px;
            border-right: 2px solid var(--neon-red);
        }

        .sidebar a {
            padding: 15px 30px; text-decoration: none; font-size: 14px;
            color: #ccc; display: block; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .sidebar a:hover { color: var(--neon-red); background: var(--glass); padding-left: 40px; }

        .menu-btn {
            position: fixed; top: 20px; left: 20px; z-index: 999;
            cursor: pointer; background: var(--neon-red);
            padding: 10px; border-radius: 5px; font-weight: bold;
        }

        /* --- CONTENU --- */
        .container {
            max-width: 800px; margin: 80px auto; padding: 20px;
            text-align: center;
        }

        .profile-img {
            width: 150px; height: 150px; border-radius: 50%;
            border: 3px solid var(--neon-red);
            box-shadow: 0 0 20px var(--neon-red);
            object-fit: cover; animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--neon-red); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px var(--neon-red); }
            100% { transform: scale(1); box-shadow: 0 0 20px var(--neon-red); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2.5rem;
            color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red);
            margin: 20px 0;
        }

        /* --- SECTION FAKE CHAT (COPIER) --- */
        .copy-box {
            background: var(--glass); border: 1px dashed var(--neon-red);
            padding: 20px; border-radius: 10px; margin: 30px 0;
            position: relative;
        }

        .copy-text { color: #00ff00; margin-bottom: 15px; display: block; }

        .btn-copy {
            background: var(--neon-red); border: none; color: white;
            padding: 10px 20px; cursor: pointer; font-family: 'Orbitron';
            border-radius: 5px; transition: 0.3s;
        }

        .btn-copy:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--neon-red); }

        /* --- TOOLS TERMUX --- */
        .tools-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #333;
            padding: 15px; border-radius: 5px; transition: 0.3s;
        }

        .tool-card:hover { border-color: var(--neon-red); background: var(--glass); }

        .tool-card span { color: var(--neon-red); font-weight: bold; }

        footer { margin-top: 50px; padding: 20px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
